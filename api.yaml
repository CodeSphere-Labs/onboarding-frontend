info:
  title: OnboardPro API
  description: Backend API reference for OnboardPro
  version: 1.0.0
  contact: {}
tags:
  - name: Auth
    description: Backend-managed cookie authentication
  - name: Users
    description: User lifecycle and employee cards
servers: []
components:
  securitySchemes:
    access_token:
      type: apiKey
      in: cookie
      name: access_token
      description: httpOnly access token cookie
    refresh_token:
      type: apiKey
      in: cookie
      name: refresh_token
      description: httpOnly refresh token cookie
  schemas:
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: employee@onboardpro.local
        password:
          type: string
          example: temporary-password
      required:
        - email
        - password
    ChangeTemporaryPasswordDto:
      type: object
      properties:
        currentPassword:
          type: string
          example: temporary-password
        newPassword:
          type: string
          example: new-secure-password
      required:
        - currentPassword
        - newPassword
    CreateDepartmentDto:
      type: object
      properties:
        name:
          type: string
          example: Engineering
          minLength: 2
          maxLength: 120
        code:
          type: string
          example: ENG
      required:
        - name
    Object:
      type: object
      properties: {}
    CreatePositionDto:
      type: object
      properties:
        name:
          type: string
          example: Backend Developer
          minLength: 2
          maxLength: 120
        departmentId:
          type: string
          format: uuid
      required:
        - name
    CreateUserDto:
      type: object
      properties:
        fullName:
          type: string
          example: Alex Doe
          minLength: 2
          maxLength: 180
        email:
          type: string
          example: alex@example.com
        role:
          type: string
          enum:
            - hr
            - recruiter
            - manager
            - employee
          example: employee
        departmentId:
          type: string
          format: uuid
        positionId:
          type: string
          format: uuid
        managerId:
          type: string
          format: uuid
        recruiterId:
          type: string
          format: uuid
        startDate:
          type: string
          example: 2026-04-15
          format: date
        employmentStatus:
          type: string
          enum:
            - invited
            - active
            - inactive
          example: invited
      required:
        - fullName
        - email
        - role
        - startDate
    UpdateUserDto:
      type: object
      properties:
        fullName:
          type: string
          example: Alex Updated
          minLength: 2
          maxLength: 180
        email:
          type: string
          example: alex.updated@example.com
        role:
          type: string
          enum:
            - hr
            - recruiter
            - manager
            - employee
          example: employee
        departmentId:
          type: object
          format: uuid
          nullable: true
        positionId:
          type: object
          format: uuid
          nullable: true
        managerId:
          type: object
          format: uuid
          nullable: true
        recruiterId:
          type: object
          format: uuid
          nullable: true
        startDate:
          type: string
          example: 2026-04-15
          format: date
        employmentStatus:
          type: string
          enum:
            - invited
            - active
            - inactive
          example: active
    TemplateTaskDto:
      type: object
      properties:
        title:
          type: string
          example: Get access to internal systems
        description:
          type: string
          example: Request Slack, Jira, and email access
        period:
          type: string
          enum:
            - week_1
            - week_2
            - week_3
            - week_4
            - week_5
            - week_6
            - week_7
            - week_8
            - week_9
            - week_10
            - week_11
            - week_12
            - month_1
            - month_2
            - month_3
          example: week_1
        sortOrder:
          type: number
          example: 1
          minimum: 1
      required:
        - title
        - period
        - sortOrder
    CreateOnboardingTemplateDto:
      type: object
      properties:
        name:
          type: string
          example: Backend Engineer Onboarding
        description:
          type: string
          example: Base plan for backend engineers
        departmentId:
          type: string
          format: uuid
        positionId:
          type: string
          format: uuid
        isActive:
          type: boolean
          example: true
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TemplateTaskDto"
      required:
        - name
        - tasks
    UpdateOnboardingTemplateDto:
      type: object
      properties:
        name:
          type: string
          example: Backend Engineer Onboarding
        description:
          type: string
          example: Base plan for backend engineers
        departmentId:
          type: string
          format: uuid
        positionId:
          type: string
          format: uuid
        isActive:
          type: boolean
          example: true
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TemplateTaskDto"
    PlanTaskDto:
      type: object
      properties:
        title:
          type: string
          example: Meet your manager
        description:
          type: string
          example: Initial sync during first week
        period:
          type: string
          enum:
            - week_1
            - week_2
            - week_3
            - week_4
            - week_5
            - week_6
            - week_7
            - week_8
            - week_9
            - week_10
            - week_11
            - week_12
            - month_1
            - month_2
            - month_3
          example: week_1
        sortOrder:
          type: number
          example: 1
          minimum: 1
      required:
        - title
        - period
        - sortOrder
    CreateOnboardingPlanDto:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        managerId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        startsAt:
          type: string
          example: 2026-04-15
          format: date
        endsAt:
          type: string
          example: 2026-07-15
          format: date
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/PlanTaskDto"
      required:
        - employeeId
        - managerId
        - startsAt
    UpdateOnboardingPlanDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - active
            - completed
            - cancelled
          example: completed
        endsAt:
          type: string
          example: 2026-07-15
          format: date
    UpdateOnboardingPlanTaskDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - not_started
            - in_progress
            - completed
          example: completed
      required:
        - status
    CreateGoalDto:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        managerId:
          type: string
          format: uuid
        title:
          type: string
          example: Deliver first backend task independently
        description:
          type: string
          example: Complete the first ticket during probation
        period:
          type: string
          enum:
            - week_1
            - week_2
            - week_3
            - week_4
            - week_5
            - week_6
            - week_7
            - week_8
            - week_9
            - week_10
            - week_11
            - week_12
            - month_1
            - month_2
            - month_3
          example: month_1
      required:
        - employeeId
        - managerId
        - title
        - period
    UpdateGoalDto:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        managerId:
          type: string
          format: uuid
        title:
          type: string
          example: Deliver first backend task independently
        description:
          type: string
          example: Complete the first ticket during probation
        period:
          type: string
          enum:
            - week_1
            - week_2
            - week_3
            - week_4
            - week_5
            - week_6
            - week_7
            - week_8
            - week_9
            - week_10
            - week_11
            - week_12
            - month_1
            - month_2
            - month_3
          example: month_1
        status:
          type: string
          enum:
            - in_progress
            - completed
            - cancelled
          example: completed
    CreateAchievementDto:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        goalId:
          type: string
          format: uuid
        managerId:
          type: string
          format: uuid
        title:
          type: string
          example: Completed internal onboarding task
        description:
          type: string
          example: Successfully shipped the first backend ticket
        monthNo:
          type: number
          example: 1
          minimum: 1
          maximum: 12
      required:
        - employeeId
        - managerId
        - description
        - monthNo
    ConfirmAchievementDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - confirmed
            - rejected
          example: confirmed
        managerComment:
          type: string
          example: Great progress during month one
      required:
        - status
    CreateFeedbackDto:
      type: object
      properties:
        recipientId:
          type: string
          format: uuid
        strengths:
          type: string
          example: Strong communication and ownership
        improvements:
          type: string
          example: Could improve documentation discipline
      required:
        - recipientId
        - strengths
        - improvements
    WelcomePackResourceDto:
      type: object
      properties:
        resourceType:
          type: string
          enum:
            - file
            - link
            - contact
          example: link
        title:
          type: string
          example: Engineering Handbook
        description:
          type: string
          example: Read this before your first day
        url:
          type: string
          example: https://docs.company.local/handbook
        filePath:
          type: string
          example: /files/welcome/handbook.pdf
        contactName:
          type: string
          example: Alex Recruiter
        contactRole:
          type: string
          example: People Partner
        contactEmail:
          type: string
          example: alex@example.com
        sortOrder:
          type: number
          example: 1
          minimum: 1
      required:
        - resourceType
        - title
        - sortOrder
    CreateWelcomePackTemplateDto:
      type: object
      properties:
        name:
          type: string
          example: Backend Engineer Welcome Pack
        departmentId:
          type: string
          format: uuid
        positionId:
          type: string
          format: uuid
        isActive:
          type: boolean
          example: true
        resources:
          type: array
          items:
            $ref: "#/components/schemas/WelcomePackResourceDto"
      required:
        - name
        - resources
    AssignWelcomePackDto:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        resources:
          type: array
          items:
            $ref: "#/components/schemas/WelcomePackResourceDto"
      required:
        - employeeId
